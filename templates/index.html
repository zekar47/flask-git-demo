<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<title>{{ titulo }}</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				background-color: #f4f4f4;
				text-align: center;
				padding-top: 80px;
			}
			.card {
				width: 420px;
				margin: auto;
				background: white;
				padding: 30px;
				border-radius: 14px;
				box-shadow: 0 4px 14px rgba(0,0,0,0.15);
			}
			h1 { color: #1f4e79; }
			p  { font-size: 20px; }
		</style>
	</head>
	<body>
		<div class="card">
			<h1>{{ titulo }}</h1>
			<p>{{ mensaje }}</p>
		</div>
	</body>
</html>
